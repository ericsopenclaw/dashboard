<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Flow - Ambient Timer for Deep Work</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎧</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header>
            <h1>🎧 Focus Flow</h1>
            <p class="tagline">Deep work, beautiful sounds</p>
        </header>

        <main>
            <!-- Timer Section -->
            <section class="timer-section">
                <div class="timer-display">
                    <div class="timer-ring">
                        <svg viewBox="0 0 200 200">
                            <circle class="timer-bg" cx="100" cy="100" r="90"/>
                            <circle class="timer-progress" cx="100" cy="100" r="90"/>
                        </svg>
                        <div class="timer-text">
                            <span id="minutes">25</span>:<span id="seconds">00</span>
                        </div>
                    </div>
                </div>

                <div class="timer-presets">
                    <button class="preset active" data-minutes="25">25 min</button>
                    <button class="preset" data-minutes="45">45 min</button>
                    <button class="preset" data-minutes="60">60 min</button>
                    <button class="preset" data-minutes="5">5 min</button>
                </div>

                <div class="timer-controls">
                    <button id="startBtn" class="control-btn primary">
                        <span class="icon">▶</span> Start
                    </button>
                    <button id="pauseBtn" class="control-btn" disabled>
                        <span class="icon">⏸</span> Pause
                    </button>
                    <button id="resetBtn" class="control-btn">
                        <span class="icon">↻</span> Reset
                    </button>
                </div>
            </section>

            <!-- Ambient Sounds Section -->
            <section class="sounds-section">
                <h2>🔊 Ambient Sounds</h2>
                <p class="sounds-hint">Mix multiple sounds for your perfect focus environment</p>
                
                <div class="sound-grid">
                    <div class="sound-card" data-sound="rain">
                        <div class="sound-icon">🌧️</div>
                        <div class="sound-name">Rain</div>
                        <input type="range" class="volume-slider" min="0" max="100" value="50">
                        <div class="sound-toggle"></div>
                    </div>

                    <div class="sound-card" data-sound="thunder">
                        <div class="sound-icon">⛈️</div>
                        <div class="sound-name">Thunder</div>
                        <input type="range" class="volume-slider" min="0" max="100" value="50">
                        <div class="sound-toggle"></div>
                    </div>

                    <div class="sound-card" data-sound="forest">
                        <div class="sound-icon">🌲</div>
                        <div class="sound-name">Forest</div>
                        <input type="range" class="volume-slider" min="0" max="100" value="50">
                        <div class="sound-toggle"></div>
                    </div>

                    <div class="sound-card" data-sound="ocean">
                        <div class="sound-icon">🌊</div>
                        <div class="sound-name">Ocean</div>
                        <input type="range" class="volume-slider" min="0" max="100" value="50">
                        <div class="sound-toggle"></div>
                    </div>

                    <div class="sound-card" data-sound="fire">
                        <div class="sound-icon">🔥</div>
                        <div class="sound-name">Fireplace</div>
                        <input type="range" class="volume-slider" min="0" max="100" value="50">
                        <div class="sound-toggle"></div>
                    </div>

                    <div class="sound-card" data-sound="cafe">
                        <div class="sound-icon">☕</div>
                        <div class="sound-name">Café</div>
                        <input type="range" class="volume-slider" min="0" max="100" value="50">
                        <div class="sound-toggle"></div>
                    </div>

                    <div class="sound-card" data-sound="wind">
                        <div class="sound-icon">💨</div>
                        <div class="sound-name">Wind</div>
                        <input type="range" class="volume-slider" min="0" max="100" value="50">
                        <div class="sound-toggle"></div>
                    </div>

                    <div class="sound-card" data-sound="birds">
                        <div class="sound-icon">🐦</div>
                        <div class="sound-name">Birds</div>
                        <input type="range" class="volume-slider" min="0" max="100" value="50">
                        <div class="sound-toggle"></div>
                    </div>
                </div>
            </section>

            <!-- Stats Section -->
            <section class="stats-section">
                <h2>📊 Today's Focus</h2>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="sessionsCompleted">0</div>
                        <div class="stat-label">Sessions</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="totalMinutes">0</div>
                        <div class="stat-label">Minutes</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="currentStreak">0</div>
                        <div class="stat-label">Day Streak</div>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p>Made with 🎧 for deep work lovers</p>
        </footer>
    </div>
